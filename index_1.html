<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vivian Paley 선생님 — 유아교육 상담 에이전트</title>
<style>
  :root {
    --bg: #FDFAF5;
    --surface: #FFFFFF;
    --border: #E8E0D0;
    --border-soft: #F0EAE0;
    --purple-deep: #3D2B6B;
    --purple-mid: #6B4FA0;
    --purple-light: #EDE8F8;
    --purple-pale: #F7F4FD;
    --text-primary: #1A1410;
    --text-secondary: #5C5248;
    --text-muted: #9C928A;
    --accent: #C4A882;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; font-family: 'Georgia', serif; background: var(--bg); color: var(--text-primary); }
  .app { display: flex; flex-direction: column; height: 100vh; max-width: 760px; margin: 0 auto; }

  header {
    padding: 18px 24px 14px;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
    display: flex; align-items: center; gap: 16px;
  }
  .avatar {
    width: 50px; height: 50px; border-radius: 50%;
    background: var(--purple-light); border: 2px solid var(--purple-mid);
    display: flex; align-items: center; justify-content: center;
    font-size: 20px; flex-shrink: 0;
  }
  .header-info h1 { font-size: 16px; font-weight: normal; letter-spacing: -0.01em; }
  .header-info p { font-size: 12px; color: var(--text-muted); margin-top: 2px; font-family: sans-serif; }
  .badge { display: inline-block; font-size: 10px; padding: 2px 8px; border-radius: 20px; background: var(--purple-light); color: var(--purple-deep); margin-top: 4px; font-family: sans-serif; }

  #setup { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 32px 24px; }
  .setup-card { width: 100%; max-width: 460px; background: var(--surface); border: 1px solid var(--border); border-radius: 16px; padding: 28px; }
  .ornament { text-align: center; color: var(--accent); font-size: 16px; letter-spacing: 8px; margin-bottom: 16px; }
  .setup-card h2 { font-size: 15px; font-weight: normal; margin-bottom: 8px; }
  .setup-card .desc { font-size: 13px; color: var(--text-secondary); line-height: 1.7; font-family: sans-serif; margin-bottom: 18px; }
  .setup-card a { color: var(--purple-mid); }
  .key-row { display: flex; gap: 8px; }
  .key-row input { flex: 1; padding: 10px 12px; border: 1px solid var(--border); border-radius: 10px; font-size: 13px; font-family: sans-serif; background: var(--bg); color: var(--text-primary); outline: none; }
  .key-row input:focus { border-color: var(--purple-mid); }
  .btn-start { padding: 10px 18px; background: var(--purple-deep); color: #fff; border: none; border-radius: 10px; font-size: 13px; font-family: sans-serif; cursor: pointer; }
  .btn-start:hover { background: var(--purple-mid); }
  .setup-note { font-size: 11px; color: var(--text-muted); margin-top: 10px; font-family: sans-serif; }

  #chat-view { flex: 1; display: none; flex-direction: column; overflow: hidden; }
  .quick-btns { display: flex; flex-wrap: wrap; gap: 6px; padding: 10px 20px; border-bottom: 1px solid var(--border-soft); background: var(--surface); }
  .qbtn { font-size: 12px; padding: 5px 11px; border-radius: 20px; border: 1px solid var(--border); background: var(--bg); color: var(--text-secondary); cursor: pointer; font-family: sans-serif; }
  .qbtn:hover { background: var(--purple-pale); border-color: var(--purple-mid); color: var(--purple-deep); }

  .messages { flex: 1; overflow-y: auto; padding: 20px 20px 8px; display: flex; flex-direction: column; gap: 14px; }
  .msg { display: flex; gap: 10px; align-items: flex-start; }
  .msg.user { flex-direction: row-reverse; }
  .msg-icon { width: 28px; height: 28px; border-radius: 50%; flex-shrink: 0; display: flex; align-items: center; justify-content: center; font-size: 12px; margin-top: 2px; }
  .paley-icon { background: var(--purple-light); border: 1px solid #C5B8E8; }
  .user-icon { background: var(--purple-deep); color: #fff; font-size: 10px; font-family: sans-serif; font-weight: 600; }
  .bubble { max-width: 80%; padding: 11px 14px; font-size: 14px; line-height: 1.75; border-radius: 14px; }
  .msg.paley .bubble { background: var(--surface); border: 1px solid var(--border); color: var(--text-primary); border-radius: 4px 14px 14px 14px; }
  .msg.user .bubble { background: var(--purple-deep); color: #fff; border-radius: 14px 4px 14px 14px; font-family: sans-serif; font-size: 13px; }

  .typing-dots { display: flex; gap: 4px; align-items: center; }
  .typing-dots span { width: 6px; height: 6px; border-radius: 50%; background: var(--text-muted); animation: blink 1.2s infinite; }
  .typing-dots span:nth-child(2) { animation-delay: 0.2s; }
  .typing-dots span:nth-child(3) { animation-delay: 0.4s; }
  @keyframes blink { 0%,80%,100%{opacity:0.2} 40%{opacity:1} }

  .input-area { padding: 12px 20px 16px; border-top: 1px solid var(--border); background: var(--surface); display: flex; gap: 10px; align-items: flex-end; }
  .input-area textarea { flex: 1; padding: 10px 13px; border: 1px solid var(--border); border-radius: 12px; font-size: 14px; font-family: Georgia, serif; resize: none; line-height: 1.5; color: var(--text-primary); background: var(--bg); height: 46px; max-height: 120px; outline: none; }
  .input-area textarea:focus { border-color: var(--purple-mid); }
  .send-btn { width: 42px; height: 42px; border-radius: 12px; background: var(--purple-deep); color: #fff; border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
  .send-btn:hover { background: var(--purple-mid); }
  .send-btn:disabled { opacity: 0.4; cursor: not-allowed; }
  .send-btn svg { width: 17px; height: 17px; }
  .err-msg { font-size: 12px; color: #b94040; padding: 4px 20px 0; font-family: sans-serif; }
</style>
</head>
<body>
<div class="app">
  <header>
    <div class="avatar">📖</div>
    <div class="header-info">
      <h1>Vivian Paley 선생님</h1>
      <p>이야기하기 · 이야기 연기 교육법 창시자 | Cooper 교수 연구 기반</p>
      <span class="badge">유아교육 현장 지도 상담</span>
    </div>
  </header>

  <div id="setup">
    <div class="setup-card">
      <div class="ornament">✦ ✦ ✦</div>
      <h2>Gemini API 키를 입력하세요</h2>
      <p class="desc">
        이 에이전트는 Google Gemini API를 사용합니다.<br>
        키는 브라우저 내에서만 처리되며 서버에 저장되지 않습니다.<br><br>
        키가 없으시면 <a href="https://aistudio.google.com/app/apikey" target="_blank">Google AI Studio</a>에서 무료로 발급받으세요. (Google 계정 필요, 무료 티어 제공)
      </p>
      <div class="key-row">
        <input type="password" id="apiKeyInput" placeholder="AIza로 시작하는 키를 입력하세요" />
        <button class="btn-start" onclick="startChat()">시작하기</button>
      </div>
      <p class="setup-note">※ 키를 저장하려면 시작 후 설정 아이콘을 누르세요.</p>
    </div>
  </div>

  <div id="chat-view">
    <div class="quick-btns">
      <button class="qbtn" onclick="askQuick('이야기하기 활동을 처음 시작하려면 어떻게 해야 하나요?')">이야기하기 첫 시작</button>
      <button class="qbtn" onclick="askQuick('아이가 슈퍼히어로 이야기만 하려고 해요.')">슈퍼히어로 이야기 대처</button>
      <button class="qbtn" onclick="askQuick('이야기 연기 시간에 아이들이 산만해요.')">연기 시간 운영법</button>
      <button class="qbtn" onclick="askQuick('이 활동이 문해력 발달에 어떻게 연결되나요?')">문해력 연결</button>
      <button class="qbtn" onclick="askQuick('받아 적을 때 아이 이야기를 어디까지 수정해야 하나요?')">기록자 역할</button>
      <button class="qbtn" onclick="askQuick('교사 연수 프로그램을 어떻게 구성하면 좋을까요?')">교사 연수 설계</button>
    </div>
    <div class="messages" id="messages"></div>
    <div class="err-msg" id="errMsg"></div>
    <div class="input-area">
      <textarea id="userInput" placeholder="현장 고민이나 질문을 입력하세요..." onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
      <button class="send-btn" id="sendBtn" onclick="sendMessage()" aria-label="전송">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <line x1="22" y1="2" x2="11" y2="13"></line>
          <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
        </svg>
      </button>
    </div>
  </div>
</div>

<script>
const SYSTEM = `당신은 Vivian Gussin Paley 선생님입니다. Martha Cooper 교수의 연구("The Classrooms All Young Children Need")에 기반하여 응답합니다.

핵심 교육철학:
- 아이들의 환상 놀이(Fantasy Play)는 그 자체로 교육적 가치가 있다
- 이야기하기(Storytelling/Dictation): 교사는 참여하는 기록자(participatory scribe)로서 받아 적는다. 아이는 이야기 내용에 완전한 통제권을 가진다
- 이야기 연기(Story Acting): 소품 없이, 리허설 없이 즉흥 연기. 배우 선택은 공정하게 순번제로
- 슈퍼히어로나 반복적 이야기도 아이가 개인 정체성을 그룹에 통합하는 발달 과정(세계 만들기)
- 교사 역할: 지시자에서 경청자, 관찰자, 탐정으로 변화. 아이 이야기 속 개인적 속뜻(private overtones) 포착
- 문해력: 말이 글로 변환되는 과정을 보며 어휘, 서사구조, 인쇄 개념을 자연스럽게 익힘
- 비용: 종이와 펜, 상상력만으로. 아이당 10분 이내로 진행 가능
- 글쓰기를 강요하는 작가 워크숍 방식 대신, 이야기꾼으로서의 정체성을 먼저 확립시킨다

응답 방식:
- 1인칭으로 따뜻하고 지혜로운 목소리로 말한다
- 구체적인 교실 장면이나 아이와의 대화 예시를 들어 설명한다
- 교사를 판단하지 않고, 함께 탐구하는 동반자로 접근한다
- 한국 유아교육 현장에 적용 가능한 실용적 조언을 준다
- 300~450자 내외로 핵심을 담고, 마지막에 후속 질문 하나를 던진다`;

let apiKey = '';
let history = [];

window.addEventListener('DOMContentLoaded', () => {
  const saved = localStorage.getItem('paley_gemini_key');
  if (saved) document.getElementById('apiKeyInput').value = saved;
});

function startChat() {
  const val = document.getElementById('apiKeyInput').value.trim();
  if (!val) { alert('API 키를 입력해주세요.'); return; }
  apiKey = val;
  localStorage.setItem('paley_gemini_key', val);
  document.getElementById('setup').style.display = 'none';
  const cv = document.getElementById('chat-view');
  cv.style.display = 'flex';
  addMsg('안녕하세요. 저는 Vivian Paley입니다.\n\n저는 40년이 넘는 시간 동안 시카고 대학 부속 유치원에서 아이들과 함께 이야기를 만들고, 연기하고, 들었습니다. Martha Cooper 교수님이 제 교육 방법을 깊이 연구해 주셨지요.\n\n오늘 어떤 현장의 고민을 나눠볼까요?', 'paley');
}

function addMsg(text, role) {
  const msgs = document.getElementById('messages');
  const div = document.createElement('div');
  div.className = 'msg ' + role;
  const escaped = text.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br>');
  if (role === 'paley') {
    div.innerHTML = '<div class="msg-icon paley-icon">📖</div><div class="bubble">' + escaped + '</div>';
  } else {
    div.innerHTML = '<div class="bubble">' + escaped + '</div><div class="msg-icon user-icon">나</div>';
  }
  msgs.appendChild(div);
  msgs.scrollTop = msgs.scrollHeight;
}

function showTyping() {
  const msgs = document.getElementById('messages');
  const div = document.createElement('div');
  div.className = 'msg paley'; div.id = 'typingMsg';
  div.innerHTML = '<div class="msg-icon paley-icon">📖</div><div class="bubble"><div class="typing-dots"><span></span><span></span><span></span></div></div>';
  msgs.appendChild(div);
  msgs.scrollTop = msgs.scrollHeight;
}

function hideTyping() {
  const t = document.getElementById('typingMsg');
  if (t) t.remove();
}

async function sendMessage() {
  const input = document.getElementById('userInput');
  const btn = document.getElementById('sendBtn');
  const err = document.getElementById('errMsg');
  const text = input.value.trim();
  if (!text || btn.disabled) return;
  err.textContent = '';
  input.value = '';
  input.style.height = '46px';
  btn.disabled = true;
  addMsg(text, 'user');
  history.push({ role: 'user', parts: [{ text }] });
  showTyping();
  try {
    const systemTurn = { role: 'user', parts: [{ text: SYSTEM }] };
    const systemAck = { role: 'model', parts: [{ text: '네, 저는 Vivian Paley 선생님으로서 응답하겠습니다.' }] };
    const contents = [systemTurn, systemAck, ...history];
    const res = await fetch(
      'https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=' + apiKey,
      { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ contents }) }
    );
    if (!res.ok) { const e = await res.json().catch(()=>({})); throw new Error(e.error?.message || 'HTTP ' + res.status); }
    const data = await res.json();
    const reply = data.candidates?.[0]?.content?.parts?.[0]?.text || '응답을 받지 못했습니다.';
    history.push({ role: 'model', parts: [{ text: reply }] });
    hideTyping();
    addMsg(reply, 'paley');
  } catch(e) {
    hideTyping();
    err.textContent = '오류: ' + e.message;
  }
  btn.disabled = false;
  input.focus();
}

function askQuick(q) { document.getElementById('userInput').value = q; sendMessage(); }
function handleKey(e) { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); } }
function autoResize(el) { el.style.height = '46px'; el.style.height = Math.min(el.scrollHeight, 120) + 'px'; }
</script>
</body>
</html>
